name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and critical journeys
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: careerorbit_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUTH_SECRET: careerorbit-ci-secret-at-least-32-characters
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/careerorbit_test
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/careerorbit_test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Check types
        run: npm run typecheck

      - name: Run unit and component tests
        run: npm test

      - name: Build production application
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser journeys
        run: npm run test:e2e
