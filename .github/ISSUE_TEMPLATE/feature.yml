name: Feature
description: Propose a scoped CareerOrbit feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this work solve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Describe what is included and explicitly excluded.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable conditions that must be true before merge.
    validations:
      required: true
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility and performance
      description: Note keyboard, motion, responsive, loading, or asset considerations.
